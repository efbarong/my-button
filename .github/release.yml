changelog:
  categories:
    - title: "🚀 Features"
      labels:
        - feature
    - title: "🐛 Bug Fixes"
      labels:
        - fix
    - title: "✨ Improvements"
      labels:
        - enhancement
    - title: "♻️ Refactoring"
      labels:
        - refactor
    - title: "📚 Documentation"
      labels:
        - docs
    - title: "🔧 Chore"
      labels:
        - chore
  exclude:
    labels:
      - skip-changelog
