name: Release Draft

on:
  push:
    branches: [master]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    if: "!contains(github.event.head_commit.message, 'chore(release)')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: version
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION="${LAST_TAG#v}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          PATCH=$((PATCH+1))

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          NEW_TAG="v$NEW_VERSION"

          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

          echo "Last: $LAST_TAG → New: $NEW_TAG"

      - name: Update package.json
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          jq ".version = \"$VERSION\"" package.json > tmp.json && mv tmp.json package.json
          npm install --package-lock-only

      - name: Commit version
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add package.json package-lock.json
          git commit -m "chore(release): v${{ steps.version.outputs.new_version }}" || echo "No changes"
          git push

      - name: Create tag
        run: |
          git tag ${{ steps.version.outputs.new_tag }} || true
          git push origin ${{ steps.version.outputs.new_tag }} || true

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LAST_TAG="${{ steps.version.outputs.last_tag }}"
          NEW_TAG="${{ steps.version.outputs.new_tag }}"

          if git rev-parse "$LAST_TAG" >/dev/null 2>&1; then
            echo "Using notes from $LAST_TAG"
            gh release create "$NEW_TAG" \
              --draft \
              --title "$NEW_TAG" \
              --generate-notes \
              --notes-start-tag "$LAST_TAG"
          else
            echo "No previous tag found, generating notes from scratch"
            gh release create "$NEW_TAG" \
              --draft \
              --title "$NEW_TAG" \
              --generate-notes
          fi