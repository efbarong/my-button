name: Release Draft

on:
  push:
    branches: [master]

concurrency:
  group: release-draft-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create-draft:
    if: "contains(github.event.head_commit.message, 'chore(release)')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          VERSION=$(jq -r .version package.json)
          TAG="v$VERSION"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Get previous tag (exclude current)
        id: prev
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          LAST_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -n 1 || true)

          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT

          echo "Previous tag: $LAST_TAG"

      - name: Create tag if not exists
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists locally"
          else
            git tag "$TAG"
          fi

          git push origin "$TAG" || echo "Tag already exists remotely"

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          LAST_TAG="${{ steps.prev.outputs.last_tag }}"
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}"

          if [ -n "$LAST_TAG" ] && git rev-parse "$LAST_TAG" >/dev/null 2>&1; then
            LOG=$(git log ${LAST_TAG}..HEAD --pretty=format:"%h|%s")
          else
            LOG=$(git log --pretty=format:"%h|%s")
          fi

          # limpiar espacios
          LOG=$(echo "$LOG" | sed 's/^[[:space:]]*//')

          FEATURES=$(echo "$LOG" | grep -iE "^.*\|feat" || true)
          FIXES=$(echo "$LOG" | grep -iE "^.*\|fix" || true)
          OTHERS=$(echo "$LOG" | grep -viE "^.*\|(feat|fix|chore\(release\))" || true)

          format_commits () {
            echo "$1" | while IFS="|" read -r HASH MSG; do
              [ -z "$HASH" ] && continue
              echo "- $MSG ([${HASH}](${REPO_URL}/commit/${HASH}))"
            done
          }

          NOTES=""

          if [ -n "$FEATURES" ]; then
            NOTES="$NOTES\n### ✨ Features\n$(format_commits "$FEATURES")\n"
          fi

          if [ -n "$FIXES" ]; then
            NOTES="$NOTES\n### 🐛 Fixes\n$(format_commits "$FIXES")\n"
          fi

          if [ -n "$OTHERS" ]; then
            NOTES="$NOTES\n### 📦 Others\n$(format_commits "$OTHERS")\n"
          fi

          if [ -n "$LAST_TAG" ]; then
            CHANGELOG_URL="${REPO_URL}/compare/${LAST_TAG}...${TAG}"
            NOTES="$NOTES\n---\n\n**Full Changelog**: ${CHANGELOG_URL}\n"
          fi

          echo -e "$NOTES" > notes.md

      - name: Create or replace draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          # eliminar draft existente del mismo tag si existe
          IS_DRAFT=$(gh release view "$TAG" --json isDraft -q .isDraft 2>/dev/null || echo "")

          if [ "$IS_DRAFT" = "true" ]; then
            echo "Replacing existing draft for $TAG"
            gh release delete "$TAG" --yes
          fi

          gh release create "$TAG" \
            --draft \
            --title "$TAG" \
            --notes-file notes.md