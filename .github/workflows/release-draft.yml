name: Release Draft

on:
  push:
    branches: [master]

concurrency:
  group: release-draft-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create-draft:
    if: "contains(github.event.head_commit.message, 'chore(release)')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from commit
        id: version
        run: |
          VERSION=$(jq -r .version package.json)
          TAG="v$VERSION"

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag "$TAG" || true
          git push origin "$TAG" || true

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LAST_TAG="${{ steps.version.outputs.last_tag }}"
          TAG="${{ steps.version.outputs.tag }}"
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}"

          if git rev-parse "$LAST_TAG" >/dev/null 2>&1; then
            LOG=$(git log ${LAST_TAG}..HEAD --pretty=format:"%h|%s")
          else
            LOG=$(git log --pretty=format:"%h|%s")
          fi

          LOG=$(echo "$LOG" | sed 's/^[[:space:]]*//')

          FEATURES=$(echo "$LOG" | grep -iE "^.*\|feat" || true)
          FIXES=$(echo "$LOG" | grep -iE "^.*\|fix" || true)
          OTHERS=$(echo "$LOG" | grep -viE "^.*\|(feat|fix|chore\(release\))" || true)

          format_commits () {
            echo "$1" | while IFS="|" read -r HASH MSG; do
              echo "- $MSG ([${HASH}](${REPO_URL}/commit/${HASH}))"
            done
          }

          NOTES=""

          if [ -n "$FEATURES" ]; then
            NOTES="$NOTES\n### ✨ Features\n$(format_commits "$FEATURES")\n"
          fi

          if [ -n "$FIXES" ]; then
            NOTES="$NOTES\n### 🐛 Fixes\n$(format_commits "$FIXES")\n"
          fi

          if [ -n "$OTHERS" ]; then
            NOTES="$NOTES\n### 📦 Others\n$(format_commits "$OTHERS")\n"
          fi

          echo -e "$NOTES" > notes.md